<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Huỷ lịch đặt sân</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }

        button:hover {
            background-color: #c9302c;
        }

        .error {
            background-color: #f8d7da;
            color: #842029;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-left: 5px solid #f5c2c7;
            border-radius: 4px;
        }
        .btn-style {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #4ca1af;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-style:hover {
            background-color: #4ca1af;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Huỷ lịch đặt sân</h2>

    <!-- Hiển thị lỗi nếu có -->
    <div th:if="${error}" class="error">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/lich-dat/huy}" method="post">
        <input type="hidden" name="id" th:value="${lich.id}">
        <label for="ghiChu"><strong>Lý do huỷ:</strong></label>
        <textarea id="ghiChu" name="ghiChu" placeholder="Nhập lý do huỷ..." required></textarea>
        <button type="submit">Xác nhận huỷ</button>
        <a th:href="@{/ve-trang-chu}" class="btn-style">Quay lại trang chủ</a>

    </form>
</div>

</body>
</html>
